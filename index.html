<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:16px}
#outer{display:flex;flex-direction:column;gap:12px;width:100%}
#top-row{display:flex;flex-direction:row;align-items:stretch;gap:12px;width:100%}
#root{flex:1;min-width:0;background:#fff;border:1px solid #ccc;display:grid;grid-template-rows:auto 1fr auto;grid-template-columns:auto 1fr auto}
.corner{width:48px;height:48px}
.h-bar{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 0}
.h-bar.top{grid-row:1;grid-column:2}
.h-bar.bot{grid-row:3;grid-column:2}
.v-bar{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 8px}
.v-bar.left{grid-row:2;grid-column:1}
.v-bar.right{grid-row:2;grid-column:3}
#grid-wrapper{grid-row:2;grid-column:2;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;position:relative}
#grid-container{display:grid;position:relative}
#border-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:100}
.btn{width:32px;height:32px;background:#4285f4;color:#fff;border:none;border-radius:4px;font-size:18px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn:hover{background:#3071e8}
.btn:active{transform:scale(.95)}
.cell{position:relative;border:.5px solid #bbb;overflow:hidden;cursor:pointer;flex-shrink:0;background:transparent}
.cell::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:10;opacity:0;transition:opacity .12s ease,background .12s ease;background:rgba(66,133,244,.32)}
.cell:hover::after{opacity:1}
.cell:hover .cell-bg,.cell:hover .cell-overlay{opacity:.35}
.cell.no-upgrade{cursor:not-allowed}
.cell.no-upgrade:hover::after{background:rgba(229,57,53,.38)}
.cell.flashing{background-color:transparent}
.cell.flashing::after{background:rgba(229,57,53,.45);opacity:1;z-index:20}
.cell.flashing .cell-bg,.cell.flashing .cell-overlay{opacity:.35}
@keyframes wasmPO{0%,12.49%{opacity:1}12.5%,24.99%{opacity:0}25%,37.49%{opacity:1}37.5%,49.99%{opacity:0}50%,62.49%{opacity:1}62.5%,74.99%{opacity:0}75%,87.49%{opacity:1}87.5%,100%{opacity:0}}
@keyframes wasmPT{0%,12.49%{opacity:.38}12.5%,24.99%{opacity:1}25%,37.49%{opacity:.38}37.5%,49.99%{opacity:1}50%,62.49%{opacity:.38}62.5%,74.99%{opacity:1}75%,87.49%{opacity:.38}87.5%,100%{opacity:1}}
.cell.wasm-purple-flash::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:35;background:rgba(106,27,154,.55);opacity:0;animation:wasmPO 2s linear forwards}
.cell.wasm-purple-flash .cell-bg,.cell.wasm-purple-flash .cell-overlay{animation:wasmPT 2s linear forwards}
.cell .cell-bg,.cell .cell-overlay{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;display:block}
.cell .cell-bg{z-index:1}
.cell .cell-overlay{z-index:2}
.cell.cell--city-tile{overflow:visible;z-index:2}
.cell .cell-overlay.cell-overlay--city{width:116%;height:116%;left:50%;top:auto;bottom:0;transform:translateX(-50%);object-fit:contain;object-position:center bottom}
#selected-box.selected-has-city{overflow:visible}
#selected-box .si-overlay.si-overlay--city{width:116%;height:116%;left:50%;top:auto;bottom:0;transform:translateX(-50%);object-fit:contain;object-position:center bottom}
.sidebar-item.sidebar-city-tile{overflow:visible}
.sidebar-item .si-overlay.si-overlay--city{width:116%;height:116%;left:50%;top:auto;bottom:0;transform:translateX(-50%);object-fit:contain;object-position:center bottom}
#sidebar{flex-shrink:0;background:#fff;border:1px solid #ccc;display:flex;flex-direction:column;align-items:stretch;padding:8px;gap:6px;overflow-y:auto}
.sidebar-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em}
#selected-row{display:flex;justify-content:center;padding-bottom:6px;border-bottom:1px solid #ddd;margin-bottom:2px}
#selected-box{width:72px;height:72px;border:3px solid #4285f4;border-radius:6px;overflow:hidden;flex-shrink:0;position:relative;background:#eee}
#tile-cols{display:flex;flex-direction:row;gap:4px;align-items:flex-start}
.tile-col{display:flex;flex-direction:column;gap:4px}
.sidebar-item{width:60px;height:60px;border:2px solid transparent;border-radius:4px;cursor:pointer;overflow:hidden;flex-shrink:0;position:relative;background:#eee}
.sidebar-item:hover{border-color:#aaa}
.sidebar-item.active{border-color:#4285f4}
.sidebar-item.upgrade-tool{background:#e8f4fd}
.sidebar-item.upgrade-tool.active{border-color:#29b6f6;background:#b3e5fc}
.sidebar-item.upgrade-tool img{width:100%;height:100%;object-fit:contain}
.si-bg,.si-overlay{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;display:block}
.si-bg{z-index:1}
.si-overlay{z-index:2}
#bottom-bar{background:#fff;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;width:100%;padding:8px 12px}
#calc-bar-group{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
#calc-best-total{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:10em;padding:10px 16px;border:2px solid #c5cae9;border-radius:8px;background:#f8f9ff;font:600 18px system-ui,-apple-system,sans-serif;color:#333;line-height:1.2}
#calc-best-total .calc-best-label{color:#5c6bc0;font-weight:500;font-size:15px;margin-right:0}
#calc-best-total strong{font-weight:700;font-size:22px;color:#1a237e;letter-spacing:.02em}
#calc-btn{padding:0 32px;height:44px;background:#4285f4;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:.02em}
#calc-btn:hover{background:#3071e8}
#calc-btn:active{transform:scale(.98)}
#undo-clear-section{padding-top:6px;border-top:1px solid #ddd;margin-top:2px;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
.undo-clear-row{display:flex;flex-direction:row;align-items:flex-end;justify-content:center;gap:12px}
.undo-clear-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.sidebar-square-btn{width:72px;height:72px;border-radius:6px;border-width:3px;border-style:solid;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;box-sizing:border-box;padding:0;flex-shrink:0}
.sidebar-square-btn:active{transform:scale(.95)}
.sidebar-square-btn:disabled{opacity:.45;cursor:not-allowed}
#undo-btn{border-color:#4285f4;background:#e8f4fd;font-size:13px;font-weight:600;color:#1a237e;letter-spacing:.02em}
#undo-btn:not(:disabled):hover{background:#d2e7fc}
#clear-btn{border-color:#e53935;background:#fff0f0}
#clear-btn:hover{background:#ffcdd2}
#clear-btn svg{width:48px;height:48px}
#debug-panel{background:#1e1e1e;color:#d4d4d4;border:1px solid #444;border-radius:6px;padding:12px;font-family:'Courier New',monospace;font-size:12px;width:100%;overflow-x:auto}
.debug-title{color:#569cd6;font-weight:bold;font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.debug-title::before{content:'▶';font-size:10px;color:#4ec9b0}
.debug-block{margin-bottom:14px}
.debug-block:last-child{margin-bottom:0}
.debug-label{color:#4ec9b0;font-size:11px;margin-bottom:4px;font-weight:bold}
.debug-grid-row{display:flex;gap:4px;margin:2px 0}
.debug-grid-cell{padding:2px 6px;border-radius:3px;font-size:11px;min-width:72px;text-align:center;background:#2d2d2d;color:#9cdcfe;border:1px solid #3c3c3c}
.debug-grid-cell.city-small{background:#1a3a5c;color:#79c0ff;border-color:#4285f4}
.debug-grid-cell.city-big{background:#3a1a5c;color:#d2a8ff;border-color:#9b59b6}
.debug-inline{color:#ce9178}
.debug-num{color:#b5cea8}
.debug-key{color:#9cdcfe}
#calc-overlay{position:fixed;inset:0;background:rgba(255,255,255,.88);z-index:10000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#calc-overlay.hidden{display:none!important}
#calc-overlay-inner{text-align:center;color:#333;font:500 17px system-ui,-apple-system,sans-serif}
#calc-spinner{width:52px;height:52px;margin:0 auto 18px;border:4px solid #e3e8ef;border-top-color:#4285f4;border-radius:50%;animation:calcSpin .75s linear infinite}
@keyframes calcSpin{to{transform:rotate(360deg)}}
#calc-btn:disabled{opacity:.55;cursor:not-allowed}
</style>
</head>
<body>
<div id="calc-overlay" class="hidden" aria-hidden="true" role="dialog" aria-busy="true" aria-label="Calculating">
<div id="calc-overlay-inner"><div id="calc-spinner"></div><div>Calculating…</div></div>
</div>
<div id="outer">
<div id="top-row">
<div id="root">
<div class="corner" style="grid-row:1;grid-column:1"></div>
<div class="h-bar top"><button class="btn" id="top-plus">+</button></div>
<div class="corner" style="grid-row:1;grid-column:3"></div>
<div class="v-bar left"><button class="btn" id="left-plus">+</button></div>
<div id="grid-wrapper"><div id="grid-container"></div><svg id="border-svg"></svg></div>
<div class="v-bar right"><button class="btn" id="right-plus">+</button></div>
<div class="corner" style="grid-row:3;grid-column:1"></div>
<div class="h-bar bot"><button class="btn" id="bot-plus">+</button></div>
<div class="corner" style="grid-row:3;grid-column:3"></div>
</div>
<div id="sidebar">
<div class="sidebar-label" style="text-align:center">Selected</div>
<div id="selected-row"><div id="selected-box"></div></div>
<div class="sidebar-label">Tiles</div>
<div id="tile-cols"></div>
<div id="undo-clear-section">
<div class="undo-clear-row">
<div class="undo-clear-col"><div class="sidebar-label">History</div>
<button type="button" id="undo-btn" class="sidebar-square-btn" disabled title="Undo last change (painting, grid size, Calculate, …). No redo.">Undo</button></div>
<div class="undo-clear-col"><div class="sidebar-label">Clear</div>
<button type="button" id="clear-btn" class="sidebar-square-btn" title="Clear all tiles">
<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="20" stroke="#e53935" stroke-width="4"/><line x1="10" y1="38" x2="38" y2="10" stroke="#e53935" stroke-width="4" stroke-linecap="round"/></svg>
</button></div></div></div>
</div></div>
<div id="bottom-bar"><div id="calc-bar-group"><div id="calc-best-total" aria-live="polite"><span class="calc-best-label">Best market total</span><strong id="calc-best-total-value">—</strong></div><button type="button" id="calc-btn" disabled title="Loading solver…">Calculate</button></div></div>
<div id="debug-panel">
<div class="debug-title">Debug</div>
<div class="debug-block"><div class="debug-label">cityCenters</div><div id="dbg-city-centers"></div></div>
<div class="debug-block"><div class="debug-label">actionOrder</div><div id="dbg-action-order"></div></div>
<div class="debug-block"><div class="debug-label">tilesOwnedByCity</div><div id="dbg-tiles-owned"></div></div>
<div class="debug-block"><div class="debug-label">grid</div><div id="dbg-grid"></div></div>
</div>
</div>
<script type="module">
const $ = id => document.getElementById(id);
let wasmPurpleFlashTimeoutId = null;
let calcWorker = null;
let calcWorkerReady = false;
let calcInProgress = false;

function showCalcOverlay() {
  const o = $('calc-overlay');
  o.classList.remove('hidden');
  o.setAttribute('aria-hidden', 'false');
}
function hideCalcOverlay() {
  const o = $('calc-overlay');
  o.classList.add('hidden');
  o.setAttribute('aria-hidden', 'true');
}

function initCalcWorker() {
  try {
    calcWorker = new Worker(new URL('marketcalc-calc-worker.js', import.meta.url), { type: 'module' });
  } catch (e) {
    console.error(e);
    alert('Could not start calculation worker: ' + (e && e.message ? e.message : e));
    return;
  }
  calcWorker.onmessage = (ev) => {
    const m = ev.data;
    if (m.type === 'ready') {
      calcWorkerReady = true;
      const btn = $('calc-btn');
      if (btn) { btn.disabled = false; btn.title = ''; }
      return;
    }
    if (m.type === 'initError') {
      console.error('Worker WASM init failed:', m.message);
      alert('Failed to load solver in worker: ' + m.message);
      return;
    }
    if (m.type === 'error') {
      hideCalcOverlay();
      calcInProgress = false;
      const btn = $('calc-btn');
      if (btn) btn.disabled = false;
      alert('Calculation failed: ' + m.message);
      return;
    }
    if (m.type === 'ok') {
      hideCalcOverlay();
      calcInProgress = false;
      const v = $('calc-best-total-value');
      if (v && typeof m.bestMarketTotal === 'number') v.textContent = String(m.bestMarketTotal);
      applyWasmResultFromWorker(m.result);
      const btn = $('calc-btn');
      if (btn) btn.disabled = false;
    }
  };
  calcWorker.onerror = (e) => {
    console.error(e);
    hideCalcOverlay();
    calcInProgress = false;
    const btn = $('calc-btn');
    if (btn) btn.disabled = false;
    alert('Worker error: ' + (e && e.message ? e.message : 'unknown'));
  };
}

initCalcWorker();

const F = 'img/field.png', W = 'img/water.png';
const tileBg = { ...Object.fromEntries([0,1,2,3,4,5,6,8,9].map(k => [k, F])), 7: W };
const tileOverlay = {
  0: F, 1: 'img/village.png', 2: 'img/mountain.png', 3: 'img/crop.png', 4: 'img/windmill.png',
  5: 'img/market.png', 6: 'img/farm.png', 7: null, 8: 'img/small_city.png', 9: 'img/big_city.png'
};
const tileNames = { 0:'field',1:'village',2:'mountain',3:'crop',4:'windmill',5:'market',6:'farm',7:'water',8:'small_city',9:'big_city' };
const upgradeChain = { 1: 8, 8: 9 };
const sidebarCols = [[0, 7, 2], [3, 6, 4], [1, 'upgrade', 5]];
const cityTiles = new Set([8, 9]);
const cityShapeOverlay = new Set([8, 9]);

let cityCenters = [], actionOrder = [], tilesOwnedByCity = {}, selectedVal = 1, cellSize = 100;
function newRow(len) { return Array.from({ length: len }, () => 0); }
let grid = [newRow(3), newRow(3), newRow(3)];
let undoStack = [];

function cloneTilesOwnedByCity(src) {
  const out = {};
  for (const k of Object.keys(src)) out[k] = src[k].map(t => ({ r: t.r, c: t.c }));
  return out;
}
function snapshotEditorState() {
  return {
    grid: grid.map(row => row.slice()),
    cityCenters: cityCenters.map(cc => ({ r: cc.r, c: cc.c })),
    actionOrder: actionOrder.slice(),
    tilesOwnedByCity: cloneTilesOwnedByCity(tilesOwnedByCity)
  };
}
function restoreEditorState(s) {
  grid = s.grid.map(row => row.slice());
  cityCenters = s.cityCenters.map(cc => ({ r: cc.r, c: cc.c }));
  actionOrder = s.actionOrder.slice();
  tilesOwnedByCity = cloneTilesOwnedByCity(s.tilesOwnedByCity);
}
function pushUndoSnapshot() { undoStack.push(snapshotEditorState()); updateUndoButton(); }
function updateUndoButton() { const b = $('undo-btn'); if (b) b.disabled = undoStack.length === 0; }
function resetUndoHistory() { undoStack.length = 0; updateUndoButton(); }
function undoOnce() {
  if (undoStack.length === 0) return;
  restoreEditorState(undoStack.pop());
  updateUndoButton();
  renderDebug();
  render();
}
function isUpgradeTool() { return selectedVal === 'upgrade'; }
function tileInnerHTML(val) {
  if (val === 'upgrade') return '<img src="img/upgrade.png" alt="" style="width:100%;height:100%;object-fit:contain">';
  const cityOv = cityShapeOverlay.has(val) ? ' si-overlay--city' : '';
  return (tileBg[val] ? `<img class="si-bg" src="${tileBg[val]}" alt="">` : '') +
    (tileOverlay[val] ? `<img class="si-overlay${cityOv}" src="${tileOverlay[val]}" alt="">` : '');
}
function buildSidebar() {
  const tileCols = $('tile-cols');
  tileCols.innerHTML = '';
  sidebarCols.forEach(col => {
    const colEl = document.createElement('div');
    colEl.className = 'tile-col';
    col.forEach(val => {
      const item = document.createElement('div');
      const isUp = val === 'upgrade';
      const citySide = !isUp && cityShapeOverlay.has(val);
      item.className = 'sidebar-item' + (isUp ? ' upgrade-tool' : '') + (citySide ? ' sidebar-city-tile' : '') + (val === selectedVal ? ' active' : '');
      item.dataset.val = val;
      item.innerHTML = tileInnerHTML(val);
      item.title = isUp ? 'Upgrade: village → small city → big city' : (tileNames[val] || '');
      item.addEventListener('click', () => selectTile(val));
      colEl.appendChild(item);
    });
    tileCols.appendChild(colEl);
  });
  updateSelectedBox();
}
function selectTile(val) {
  selectedVal = val;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.toggle('active', el.dataset.val == selectedVal));
  updateSelectedBox();
}
function updateSelectedBox() {
  const box = $('selected-box');
  box.innerHTML = tileInnerHTML(selectedVal);
  const isCityShape = selectedVal !== 'upgrade' && cityShapeOverlay.has(selectedVal);
  box.classList.toggle('selected-has-city', !!isCityShape);
}
function cityIdxAt(r, c) { return cityCenters.findIndex(cc => cc.r === r && cc.c === c); }
function allOwnedSet() {
  const s = new Set();
  Object.values(tilesOwnedByCity).forEach(tiles => tiles.forEach(t => s.add(`${t.r},${t.c}`)));
  return s;
}
function claimTiles(idx, cr, cc, half) {
  const owned = allOwnedSet();
  if (!tilesOwnedByCity[idx]) tilesOwnedByCity[idx] = [];
  for (let dr = -half; dr <= half; dr++) {
    for (let dc = -half; dc <= half; dc++) {
      const r = cr + dr, c = cc + dc;
      if (owned.has(`${r},${c}`)) continue;
      tilesOwnedByCity[idx].push({ r, c });
      owned.add(`${r},${c}`);
    }
  }
}
function disallowedAction(r, c) {
  const cols = grid[0].length, idx = r * cols + c, cell = $('grid-container').children[idx];
  if (!cell) return;
  cell.classList.add('flashing');
  setTimeout(() => cell.classList.remove('flashing'), 350);
}
function villageConflict(r, c) {
  const rows = grid.length, cols = grid[0].length;
  for (let dr = -2; dr <= 2; dr++) {
    for (let dc = -2; dc <= 2; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
      const v = grid[nr][nc];
      if (v === 1 || v === 8 || v === 9) return true;
    }
  }
  return false;
}
function cityAlreadyHas(r, c, tileVal) {
  const ownerIdx = Object.entries(tilesOwnedByCity).find(([, tiles]) => tiles.some(t => t.r === r && t.c === c))?.[0];
  if (ownerIdx === undefined) return false;
  return tilesOwnedByCity[ownerIdx].some(t => {
    const gr = grid[t.r], gv = gr && gr[t.c];
    return gv === tileVal;
  });
}
function handleCellClick(r, c) {
  if (isUpgradeTool()) {
    const cur = grid[r][c], next = upgradeChain[cur];
    if (next === undefined) { disallowedAction(r, c); return; }
    pushUndoSnapshot();
    grid[r][c] = next;
    if (cur === 1) {
      const idx = cityCenters.length;
      cityCenters.push({ r, c });
      actionOrder.push(idx);
      claimTiles(idx, r, c, 1);
    } else if (cur === 8) {
      const idx = cityIdxAt(r, c);
      if (idx !== -1) { actionOrder.push(idx); claimTiles(idx, r, c, 2); }
    }
    renderDebug();
    render();
  } else {
    if (cityTiles.has(grid[r][c])) { disallowedAction(r, c); return; }
    if (selectedVal === 1 && villageConflict(r, c)) { disallowedAction(r, c); return; }
    if (selectedVal === 5 && cityAlreadyHas(r, c, 5)) { disallowedAction(r, c); return; }
    if (selectedVal === 4 && cityAlreadyHas(r, c, 4)) { disallowedAction(r, c); return; }
    pushUndoSnapshot();
    grid[r][c] = selectedVal;
    renderDebug();
    render();
  }
}
function canUpgrade(val) { return upgradeChain[val] !== undefined; }
function render() {
  clearWasmPurpleFlash();
  const container = $('grid-container'), wrapper = $('grid-wrapper');
  const rows = grid.length, cols = grid[0].length;
  const maxW = wrapper.clientWidth - 16, maxH = Math.max(wrapper.clientHeight - 16, 100);
  cellSize = Math.min(Math.floor(maxW / cols), Math.floor(maxH / rows), 140);
  container.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  container.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
  container.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const val = grid[r][c], cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.width = cell.style.height = cellSize + 'px';
      if ((isUpgradeTool() && !canUpgrade(val)) || (!isUpgradeTool() && cityTiles.has(val))) cell.classList.add('no-upgrade');
      if (cityShapeOverlay.has(val)) cell.classList.add('cell--city-tile');
      if (tileBg[val]) { const bg = document.createElement('img'); bg.className = 'cell-bg'; bg.src = tileBg[val]; cell.appendChild(bg); }
      if (tileOverlay[val]) {
        const ov = document.createElement('img');
        ov.className = 'cell-overlay' + (cityShapeOverlay.has(val) ? ' cell-overlay--city' : '');
        ov.src = tileOverlay[val];
        cell.appendChild(ov);
      }
      cell.addEventListener('click', () => handleCellClick(r, c));
      container.appendChild(cell);
    }
  }
  const bb = $('bottom-bar');
  bb.style.minHeight = bb.style.height = (cellSize + 24) + 'px';
  renderBorders();
}
function renderBorders() {
  const svg = $('border-svg'), container = $('grid-container'), wrapper = $('grid-wrapper');
  const rows = grid.length, cols = grid[0].length, W = cols * cellSize, H = rows * cellSize;
  const cRect = container.getBoundingClientRect(), wRect = wrapper.getBoundingClientRect();
  svg.style.left = (cRect.left - wRect.left) + 'px';
  svg.style.top = (cRect.top - wRect.top) + 'px';
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';
  const stroke = Math.max(3, Math.round(cellSize * 0.1));
  Object.entries(tilesOwnedByCity).forEach(([, tiles]) => {
    const inBounds = tiles.filter(t => t.r >= 0 && t.r < rows && t.c >= 0 && t.c < cols);
    if (inBounds.length === 0) return;
    const owned = new Set(tiles.map(t => `${t.r},${t.c}`));
    const segments = [];
    inBounds.forEach(({ r, c }) => {
      const x = c * cellSize, y = r * cellSize;
      if (!owned.has(`${r - 1},${c}`)) segments.push([x, y, x + cellSize, y]);
      if (!owned.has(`${r + 1},${c}`)) segments.push([x, y + cellSize, x + cellSize, y + cellSize]);
      if (!owned.has(`${r},${c - 1}`)) segments.push([x, y, x, y + cellSize]);
      if (!owned.has(`${r},${c + 1}`)) segments.push([x + cellSize, y, x + cellSize, y + cellSize]);
    });
    segments.forEach(([x1, y1, x2, y2]) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', '#000000');
      line.setAttribute('stroke-width', stroke);
      line.setAttribute('stroke-linecap', 'square');
      svg.appendChild(line);
    });
  });
}
function shiftCityCenters(dr, dc) {
  cityCenters = cityCenters.map(cc => ({ r: cc.r + dr, c: cc.c + dc }));
  Object.keys(tilesOwnedByCity).forEach(idx => {
    tilesOwnedByCity[idx] = tilesOwnedByCity[idx].map(t => ({ r: t.r + dr, c: t.c + dc }));
  });
}
function validateWasmPinnedBuildingsMarkets(resultFlat, rows, cols) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const g = grid[r][c];
      if (g !== 4 && g !== 5) continue;
      const rt = resultFlat[r * cols + c];
      if (rt !== g) return { r, c, expected: g, got: rt };
    }
  }
  return null;
}
function tileTypeName(v) { return tileNames[v] != null ? tileNames[v] : String(v); }
function clearWasmPurpleFlash() {
  if (wasmPurpleFlashTimeoutId !== null) { clearTimeout(wasmPurpleFlashTimeoutId); wasmPurpleFlashTimeoutId = null; }
  const container = $('grid-container');
  if (container) container.querySelectorAll('.wasm-purple-flash').forEach(el => el.classList.remove('wasm-purple-flash'));
}
function scheduleWasmPlacementPurpleFlash(placementDiff, rows, cols) {
  clearWasmPurpleFlash();
  const indices = [];
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const t = placementDiff[r][c];
    if (t === 4 || t === 5) indices.push(r * cols + c);
  }
  if (indices.length === 0) return;
  const container = $('grid-container');
  for (const idx of indices) { const cell = container.children[idx]; if (cell) cell.classList.add('wasm-purple-flash'); }
  wasmPurpleFlashTimeoutId = setTimeout(() => {
    wasmPurpleFlashTimeoutId = null;
    const c = $('grid-container');
    if (c) c.querySelectorAll('.wasm-purple-flash').forEach(el => el.classList.remove('wasm-purple-flash'));
  }, 2000);
}

function applyWasmResultFromWorker(resultFlat) {
  const rows = grid.length, cols = grid[0].length;
  const pinViolation = validateWasmPinnedBuildingsMarkets(resultFlat, rows, cols);
  if (pinViolation) {
    const { r, c, expected, got } = pinViolation;
    alert(`Solver output changed an existing windmill or market at row ${r}, col ${c} ` +
      `(expected ${tileTypeName(expected)}, got ${tileTypeName(got)}). ` +
      `Existing buildings and markets must stay fixed.`);
    renderDebug(); render();
    return;
  }
  const placementDiff = Array.from({ length: rows }, () => Array(cols).fill(null));
  let any = false;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const rt = resultFlat[r * cols + c];
      if ((rt === 4 || rt === 5) && grid[r][c] !== rt) { placementDiff[r][c] = rt; any = true; }
    }
  }
  if (!any) { alert('No new windmill or market placements differ from your grid.'); renderDebug(); render(); return; }
  pushUndoSnapshot();
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const t = placementDiff[r][c];
    if (t === 4 || t === 5) grid[r][c] = t;
  }
  renderDebug();
  render();
  scheduleWasmPlacementPurpleFlash(placementDiff, rows, cols);
}

$('top-plus').onclick  = () => { pushUndoSnapshot(); grid.unshift(newRow(grid[0].length)); shiftCityCenters(1, 0); renderDebug(); render(); };
$('bot-plus').onclick  = () => { pushUndoSnapshot(); grid.push(newRow(grid[0].length)); renderDebug(); render(); };
$('left-plus').onclick = () => { pushUndoSnapshot(); grid.forEach(r => r.unshift(0)); shiftCityCenters(0, 1); renderDebug(); render(); };
$('right-plus').onclick= () => { pushUndoSnapshot(); grid.forEach(r => r.push(0)); renderDebug(); render(); };

$('calc-btn').onclick = () => {
  if (!calcWorkerReady || !calcWorker) {
    alert('Solver is still loading. Please wait a moment and try again.');
    return;
  }
  if (calcInProgress) return;
  const rows = grid.length, cols = grid[0].length, flatGrid = grid.flat();
  if (flatGrid.length !== rows * cols) {
    console.error('Grid flattening error: expected length', rows * cols, 'but got', flatGrid.length);
    return;
  }
  const numCities = cityCenters.length;
  if (numCities === 0) { alert('Add at least one city (use the upgrade tool on a village) before calculating.'); return; }
  const numActions = actionOrder.length;
  if (numActions === 0) { alert('No capture / border-growth order yet. Upgrade a village to small city first.'); return; }
  for (let i = 0; i < flatGrid.length; i++) {
    if (flatGrid[i] === 7) flatGrid[i] = 2;
    else if (flatGrid[i] === 8) flatGrid[i] = 1;
    else if (flatGrid[i] === 9) flatGrid[i] = 1;
  }
  const cityFlat = cityCenters.flatMap(cc => [cc.r, cc.c]);
  calcInProgress = true;
  $('calc-btn').disabled = true;
  showCalcOverlay();
  calcWorker.postMessage({
    type: 'calculate',
    rows,
    cols,
    flatGrid: Int32Array.from(flatGrid),
    cityFlat: Int32Array.from(cityFlat),
    actionOrder: Int32Array.from(actionOrder),
    numCities,
    numActions,
  });
};

$('undo-btn').onclick = () => undoOnce();
$('clear-btn').onclick = () => {
  if (confirm('Reset to 3x3 grid?')) {
    resetUndoHistory();
    grid = [newRow(3), newRow(3), newRow(3)];
    cityCenters = []; actionOrder = []; tilesOwnedByCity = {};
    const tv = $('calc-best-total-value');
    if (tv) tv.textContent = '—';
    renderDebug(); render();
  }
};

function renderDebug() {
  const ccEl = $('dbg-city-centers');
  ccEl.innerHTML = cityCenters.length === 0 ? '<span class="debug-inline">[]</span>'
    : cityCenters.map((cc, i) => `<span class="debug-key">[${i}]</span> <span class="debug-inline">{r: <span class="debug-num">${cc.r}</span>, c: <span class="debug-num">${cc.c}</span>}</span>`).join('<br>');
  const aoEl = $('dbg-action-order');
  aoEl.innerHTML = actionOrder.length === 0 ? '<span class="debug-inline">[]</span>'
    : `[<span class="debug-num">${actionOrder.join('</span>, <span class="debug-num">')}</span>]`;
  const toEl = $('dbg-tiles-owned'), idxs = Object.keys(tilesOwnedByCity);
  toEl.innerHTML = idxs.length === 0 ? '<span class="debug-inline">{}</span>'
    : idxs.map(idx => {
        const tiles = tilesOwnedByCity[idx];
        return `<span class="debug-key">[${idx}]</span> (${tiles.length}): ${tiles.map(t => `<span class="debug-inline">[<span class="debug-num">${t.r}</span>,<span class="debug-num">${t.c}</span>]</span>`).join(' ')}`;
      }).join('<br>');
  $('dbg-grid').innerHTML = grid.map(row => `<div class="debug-grid-row">${row.map(v => {
    let cls = 'debug-grid-cell';
    if (v === 8) cls += ' city-small';
    if (v === 9) cls += ' city-big';
    return `<span class="${cls}">${tileNames[v]}</span>`;
  }).join('')}</div>`).join('');
}

window.addEventListener('resize', render);
buildSidebar();
updateUndoButton();
render();
renderDebug();
</script>
</body>
</html>
