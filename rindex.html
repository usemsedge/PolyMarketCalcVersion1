<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Vector Sum</title>
</head>
<body>
    <h1>WASM Vector Sum</h1>
    <div id="inputs">
        <input type="number" class="number-box" placeholder="Enter a number">
    </div>
    <button id="addBox">Add Box</button>
    <button id="calculate">Calculate Sum</button>
    <p>Result: <span id="result">0</span></p>

    <script type="module">
        import createModule from './marketcalc.js';

        createModule().then((Module) => {
            const addBoxButton = document.getElementById("addBox");
            const calculateButton = document.getElementById("calculate");
            const inputsDiv = document.getElementById("inputs");
            const resultSpan = document.getElementById("result");

            // Add a new input box
            addBoxButton.addEventListener("click", () => {
                const input = document.createElement("input");
                input.type = "number";
                input.className = "number-box";
                input.placeholder = "Enter a number";
                inputsDiv.appendChild(input);
            });

            // Calculate the sum
            calculateButton.addEventListener("click", () => {
                const inputs = document.querySelectorAll(".number-box");
                const numbers = Array.from(inputs).map(input => parseInt(input.value) || 0);

                // Allocate memory for the vector
                const size = numbers.length;
                const dataPtr = Module._malloc(size * 4); // 4 bytes per int
                const dataHeap = new Int32Array(Module.HEAP32.buffer, dataPtr, size);

                // Copy numbers into WASM memory
                dataHeap.set(numbers);

                // Call the WASM function
                const sum = Module._sum_wasm(dataPtr, size);

                // Free the allocated memory
                Module._free(dataPtr);

                // Display the result
                resultSpan.textContent = sum;
            });
        });
    </script>
</body>
</html>
